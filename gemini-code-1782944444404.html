<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat Grid - Timeline Interactive</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --track-bg: #2a2a2a;
            --border-color: #333;
            --text-main: #e0e0e0;
            --accent: #ff7b00; /* Rappel des couleurs d'interface typiques */
            --kick-color: #e74c3c;
            --bass-color: #9b59b6;
            --snare-color: #3498db;
            --synth-color: #2ecc71;
            --fx-color: #f1c40f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--panel-bg);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        select {
            background-color: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            font-size: 14px;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Timeline / Arrangement View */
        .timeline-container {
            flex: 1;
            overflow-x: auto;
            overflow-y: auto;
            padding: 20px;
            position: relative;
        }

        .timeline {
            min-width: 800px; /* Force le scroll horizontal sur mobile */
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }

        .grid-header {
            display: grid;
            grid-template-columns: 120px repeat(16, 1fr);
            border-bottom: 1px solid var(--border-color);
            background-color: #222;
        }

        .grid-step {
            border-left: 1px solid #333;
            height: 30px;
            font-size: 10px;
            color: #777;
            padding-left: 4px;
            line-height: 30px;
        }

        .track {
            display: grid;
            grid-template-columns: 120px repeat(16, 1fr);
            border-bottom: 1px solid var(--border-color);
            height: 60px;
        }

        .track-header {
            background-color: #252525;
            border-right: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding-left: 10px;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
        }

        .track-grid {
            grid-column: 2 / -1;
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            position: relative;
        }

        .grid-line {
            border-left: 1px dashed #333;
            height: 100%;
        }

        .clip {
            position: absolute;
            height: 80%;
            top: 10%;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .clip:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
        }

        /* Modal / Panel d'explication */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(3px);
        }

        .modal-content {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            padding: 20px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            cursor: pointer;
            font-size: 20px;
            color: #888;
        }

        .close-btn:hover { color: white; }
        .modal-title { margin-bottom: 15px; color: var(--accent); }
        .modal-body { font-size: 14px; line-height: 1.6; color: #ccc; }
        .modal-body strong { color: white; }

        @media (max-width: 768px) {
            header { flex-direction: column; align-items: stretch; }
            .track-header { font-size: 10px; padding-left: 5px; }
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h2>Arrangement Grid</h2>
            <p style="font-size: 12px; color: #888; margin-top: 4px;">16 steps (1 Bar) - Clic sur un bloc pour la synthèse</p>
        </div>
        <select id="styleSelector">
            <option value="" disabled selected>Choisis un style...</option>
            <option value="trap">Trap</option>
            <option value="drill">UK Drill</option>
            <option value="boombap">Boom Bap</option>
            <option value="phonk">Phonk</option>
            <option value="acidcore">Acidcore</option>
            <option value="hardcore">Hardcore</option>
            <option value="frenchcore">Frenchcore</option>
            <option value="tekno">Tekno (Mental/Tribe)</option>
            <option value="hardstyle">Hardstyle</option>
            <option value="ukbass">UK Bass</option>
        </select>
    </header>

    <div class="main-container">
        <div class="timeline-container">
            <div class="timeline" id="timeline">
                </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h3 class="modal-title" id="modalTitle">Synthèse</h3>
            <div class="modal-body" id="modalBody">Détails...</div>
        </div>
    </div>

    <script>
        // Configuration des pistes
        const tracksConfig = [
            { id: 'kick', name: 'Kick', color: 'var(--kick-color)' },
            { id: 'snare', name: 'Snare/Clap', color: 'var(--snare-color)' },
            { id: 'bass', name: 'Bass/Sub', color: 'var(--bass-color)' },
            { id: 'synth', name: 'Synth/Melody', color: 'var(--synth-color)' },
            { id: 'fx', name: 'Hats/FX', color: 'var(--fx-color)' }
        ];

        // Base de données des styles (16 steps = 4 temps = 1 mesure)
        // start: position de 0 à 15. length: durée en steps.
        const stylesData = {
            trap: {
                patterns: {
                    kick: [{start: 0, length: 1}, {start: 8, length: 1}, {start: 11, length: 1}],
                    snare: [{start: 4, length: 1}, {start: 12, length: 1}],
                    bass: [{start: 0, length: 4}, {start: 8, length: 3}, {start: 11, length: 4}],
                    fx: [{start: 0, length: 16}] // Rolls de hi-hats
                },
                synthesis: {
                    kick: "<strong>Trap Kick :</strong> Court et punchy pour laisser la place au sub. Prends un sample de 808 court, coupe le sub (high-pass vers 40Hz). Ajoute du Drum Buss pour le transient.",
                    snare: "<strong>Trap Snare/Clap :</strong> Très bright. Layering d'un clap et d'une snare 808. Boost les aigus vers 5-8kHz. Ajoute une très légère reverb courte.",
                    bass: "<strong>808 Sub :</strong> Onde Sinusoïdale dans Operator. Pitch envelope rapide (decay très court) au début pour le 'clic' d'attaque. Ajoute un Saturator (mode Analog Clip) pour créer des harmoniques audibles sur téléphone.",
                    fx: "<strong>Hi-hats :</strong> Sample de 808 charley très fermé. Utilise l'arpeggiator d'Ableton (en mode 1/16, 1/32, 1/64) pour dessiner les rolls rapidement."
                }
            },
            drill: {
                patterns: {
                    kick: [{start: 0, length: 1}, {start: 5, length: 1}, {start: 9, length: 1}],
                    snare: [{start: 4, length: 1}, {start: 12, length: 1}],
                    bass: [{start: 0, length: 3}, {start: 5, length: 2}, {start: 9, length: 5}] // Slides typiques
                },
                synthesis: {
                    kick: "<strong>Drill Kick :</strong> Gros impact, souvent layeré avec la basse. Saturation lourde. Pattern très syncopé (souvent décalé par rapport à la Trap classique).",
                    bass: "<strong>808 Slides :</strong> Indispensable ! Dans ton sampler (Simpler d'Ableton), active le mode 'Glide / Portamento' (environ 100-150ms). Dessine des notes qui se chevauchent pour créer les fameux glissements d'octave.",
                    snare: "<strong>Counter Snare :</strong> Les snares en Drill rebondissent. Utilise des sons métalliques ou des rimshots très secs."
                }
            },
            boombap: {
                patterns: {
                    kick: [{start: 0, length: 1}, {start: 7, length: 1}, {start: 8, length: 1}],
                    snare: [{start: 4, length: 1}, {start: 12, length: 1}],
                    synth: [{start: 0, length: 16}] // Sample loop
                },
                synthesis: {
                    kick: "<strong>Boom Bap Kick :</strong> Son acoustique (MPC style). Baisse le bit-depth à 12-bit (Redux dans Ableton). Compresse avec une attaque lente pour laisser passer le transient.",
                    snare: "<strong>Snare :</strong> Poussiéreuse. Layering d'une snare acoustique avec du bruit de vinyle. Met la snare légèrement en avance ou en retard sur la grille pour le groove 'humanisé'.",
                    synth: "<strong>Sampling :</strong> Chop un sample de jazz/soul. Coupe les basses (low-cut) pour laisser la place au kick et à la basse. Ajoute du Wow & Flutter (effet cassette)."
                }
            },
            phonk: {
                patterns: {
                    kick: [{start: 0, length: 1}, {start: 8, length: 1}],
                    snare: [{start: 4, length: 1}, {start: 12, length: 1}],
                    bass: [{start: 0, length: 16}], // Cowbell mélodique
                    synth: [{start: 0, length: 2}, {start: 3, length: 2}, {start: 6, length: 2}] // Cowbell
                },
                synthesis: {
                    kick: "<strong>Phonk Kick :</strong> Sur-saturé. Utilise un clipper rigide et écrase le kick contre un plafond numérique. Ça doit distordre sale.",
                    synth: "<strong>La fameuse Cowbell :</strong> Prends une cowbell de TR-808. Accorde-la. Ajoute du chorus, une bonne dose de saturation et un delay. C'est elle qui fait la mélodie principale.",
                    bass: "<strong>Memphis Sub :</strong> Basse continue, très sourde. Uniquement des fréquences sous 60Hz. Sidechain ultra agressif sur le kick."
                }
            },
            acidcore: {
                patterns: {
                    kick: [{start: 0, length: 2}, {start: 4, length: 2}, {start: 8, length: 2}, {start: 12, length: 2}],
                    bass: [{start: 2, length: 2}, {start: 6, length: 2}, {start: 10, length: 2}, {start: 14, length: 2}], // 303 line
                    fx: [{start: 2, length: 1}, {start: 6, length: 1}, {start: 10, length: 1}, {start: 14, length: 1}] // Offbeat hats
                },
                synthesis: {
                    kick: "<strong>Kick Acidcore :</strong> Base 909. Traitement : Overdrive -> EQ (boost vers 100Hz) -> Saturator (Digital Clip). Répète ça deux fois. Ça doit taper et grogner dans les mediums.",
                    bass: "<strong>Synthé 303 :</strong> Onde carrée ou dent de scie. Filtre Low-Pass (24dB/oct). Monte la résonance à fond pour que ça 'crie'. Assigne une enveloppe (decay court) au cutoff du filtre et automatise tout ça.",
                    fx: "<strong>Rides/Hats :</strong> Ride 909 très forte sur le contretemps. Compressée en sidechain pour pomper avec le kick."
                }
            },
            hardcore: {
                patterns: {
                    kick: [{start: 0, length: 2}, {start: 4, length: 2}, {start: 8, length: 2}, {start: 12, length: 2}],
                    synth: [{start: 0, length: 8}, {start: 8, length: 8}] // Hoover ou Screech
                },
                synthesis: {
                    kick: "<strong>Gabba/Hardcore Kick :</strong> Le fameux 'PONG'. Prends un kick 909. Passe-le dans un EQ (boost 500Hz) -> Distorsion lourde (Trash2 ou Roar) -> Filtre Low-pass pour enlever le bruit aigu -> Re-distorsion. Le tail (la queue) du kick devient une basse continue.",
                    synth: "<strong>Screech :</strong> Wavetable. Prends une onde complexe (type vocal ou FM). Pitch LFO très rapide (vibrato extrême). Ajoute une grosse distorsion et joue ça dans les octaves hautes."
                }
            },
            frenchcore: {
                patterns: {
                    kick: [{start: 0, length: 1}, {start: 4, length: 1}, {start: 8, length: 1}, {start: 12, length: 1}],
                    bass: [{start: 1, length: 3}, {start: 5, length: 3}, {start: 9, length: 3}, {start: 13, length: 3}] // Bass on offbeat
                },
                synthesis: {
                    kick: "<strong>Frenchcore Kick (Tok/Punch) :</strong> Le kick est séparé en deux. Ici, c'est juste le 'Tok' du début. Extrêmement court, percussif, aigu. Passe un kick percussif dans un Transient Shaper et monte l'attaque à fond.",
                    bass: "<strong>Frenchcore Tail :</strong> La basse rebondit *après* le kick. Prends un sub, ajoute de la distorsion. Mets un sidechain instantané par rapport au kick pour qu'elle s'arrête net quand le kick tape. Rythme en triolet parfois."
                }
            },
            tekno: {
                patterns: {
                    kick: [{start: 0, length: 2}, {start: 4, length: 2}, {start: 8, length: 2}, {start: 12, length: 2}],
                    bass: [{start: 3, length: 1}, {start: 7, length: 1}, {start: 11, length: 1}, {start: 15, length: 1}], // Rolling bass
                    synth: [{start: 0, length: 16}] // Nappes mentales
                },
                synthesis: {
                    kick: "<strong>Tekno Kick :</strong> Sourd et rond. Souvent synthétisé avec Operator. Filtre passe-bas bas (vers 200Hz). Un peu de tape saturation pour la chaleur, pas de distorsion agressive.",
                    bass: "<strong>Rolling Bass :</strong> Basses très courtes et percussives qui roulent entre les kicks (souvent en 1/16). Filtre low-pass avec une enveloppe super rapide.",
                    synth: "<strong>Nappes Mentales :</strong> Accords mineurs tenus sur de longues mesures. LFO lent sur le filtre et le pan. Énormément de réverbe (Valhalla Shimmer) et de delay avec feedback élevé."
                }
            },
            hardstyle: {
                patterns: {
                    kick: [{start: 0, length: 4}, {start: 4, length: 4}, {start: 8, length: 4}, {start: 12, length: 4}],
                    synth: [{start: 0, length: 8}, {start: 8, length: 8}]
                },
                synthesis: {
                    kick: "<strong>Hardstyle Kick :</strong> Le kick le plus complexe à créer. Attaque (Punch) + Corps + Queue (Tail) tonale. Construit en passant un kick 909 dans une chaîne infinie : EQ -> Disto -> EQ -> Disto -> EQ. Le tail doit avoir une note bien définie (pitchable).",
                    synth: "<strong>Lead Hardstyle :</strong> Supersaw. Dans Wavetable : 2 oscillateurs Sawtooth. Monte l'unisson à 7 voix, désaccorde (detune) légèrement. Ajoute un compresseur OTT, du delay et une reverb massive."
                }
            },
            ukbass: {
                patterns: {
                    kick: [{start: 0, length: 2}, {start: 6, length: 2}, {start: 10, length: 2}],
                    snare: [{start: 4, length: 2}, {start: 12, length: 2}],
                    bass: [{start: 2, length: 4}, {start: 8, length: 2}, {start: 12, length: 4}] // Syncopated wubs
                },
                synthesis: {
                    kick: "<strong>UK Bass/Garage Kick :</strong> Court, avec un bon 'thump' vers 100Hz. Pas de sub massif dedans, le sub est laissé à la ligne de basse.",
                    bass: "<strong>Wub Bass (FM/Wavetable) :</strong> Operator ou Wavetable. Module la position de l'onde ou la FM amount avec un LFO synchronisé au tempo (1/4, 1/8). Le filtre doit s'ouvrir et se fermer rythmiquement ('Wub wub').",
                    fx: "<strong>Foley / Shuffle :</strong> Groove très swing (shuffle). Utilise des boucles de percussions organiques (foley, bruits de clés, portes) coupées et calées en arrière-plan."
                }
            }
        };

        const timelineEl = document.getElementById('timeline');
        const styleSelector = document.getElementById('styleSelector');
        const modal = document.getElementById('modal');
        const closeModal = document.getElementById('closeModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');

        // Initialiser la grille vide
        function initGrid() {
            timelineEl.innerHTML = '';
            
            // Header de la timeline (les chiffres 1 à 16)
            const headerRow = document.createElement('div');
            headerRow.className = 'grid-header';
            headerRow.innerHTML = '<div></div>'; // Case vide au dessus des noms de pistes
            for(let i = 1; i <= 16; i++) {
                headerRow.innerHTML += `<div class="grid-step">${i}</div>`;
            }
            timelineEl.appendChild(headerRow);

            // Créer les pistes (sans les clips)
            tracksConfig.forEach(track => {
                const trackEl = document.createElement('div');
                trackEl.className = 'track';
                
                let gridLines = '';
                for(let i=0; i<16; i++) {
                    gridLines += `<div class="grid-line"></div>`;
                }

                trackEl.innerHTML = `
                    <div class="track-header" style="border-left: 4px solid ${track.color}">${track.name}</div>
                    <div class="track-grid" id="track-${track.id}">
                        ${gridLines}
                    </div>
                `;
                timelineEl.appendChild(trackEl);
            });
        }

        // Charger un style et placer les blocks
        function loadStyle(styleKey) {
            initGrid(); // Reset la grille
            if (!styleKey) return;

            const styleData = stylesData[styleKey];
            if (!styleData) return;

            // Pour chaque piste configurée
            tracksConfig.forEach(track => {
                const trackGrid = document.getElementById(`track-${track.id}`);
                const pattern = styleData.patterns[track.id];
                const synthesisText = styleData.synthesis[track.id] || "<em>Pas de tips spécifiques pour cet élément dans ce style. Plonge dans Ableton et expérimente !</em>";

                if (pattern) {
                    pattern.forEach(clipData => {
                        const clipEl = document.createElement('div');
                        clipEl.className = 'clip';
                        clipEl.style.backgroundColor = track.color;
                        
                        // Calcul de la position (16 steps = 16 colonnes CSS Grid)
                        // grid-column commence à 1. Donc start 0 = 1, start 4 = 5.
                        clipEl.style.gridColumn = `${clipData.start + 1} / span ${clipData.length}`;
                        
                        // Event pour ouvrir les infos de synthèse
                        clipEl.onclick = () => openModal(`${track.name} (${styleKey.toUpperCase()})`, synthesisText);
                        
                        trackGrid.appendChild(clipEl);
                    });
                }
            });
        }

        function openModal(title, text) {
            modalTitle.innerText = title;
            modalBody.innerHTML = text;
            modal.style.display = 'flex';
        }

        // Events
        styleSelector.addEventListener('change', (e) => loadStyle(e.target.value));
        
        closeModal.addEventListener('click', () => { modal.style.display = 'none'; });
        modal.addEventListener('click', (e) => {
            if(e.target === modal) modal.style.display = 'none';
        });

        // Initialisation à l'ouverture
        initGrid();

    </script>
</body>
</html>
